server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: portfolio-cms
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/portfolio_cms}
    username: ${DB_USERNAME:portfolio}
    password: ${DB_PASSWORD:portfolio}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  admin:
    seed:
      enabled: ${ADMIN_SEED_ENABLED:false}
      email: ${ADMIN_SEED_EMAIL:}
      password: ${ADMIN_SEED_PASSWORD:}
